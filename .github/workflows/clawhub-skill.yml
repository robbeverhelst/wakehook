name: ClawHub Skill

# Publishes the root SKILL.md to ClawHub on changes. Auth via a plain
# CLAWHUB_TOKEN repo secret (create one with `clawhub token` after `clawhub login`).

on:
  pull_request:
    branches: [main]
    paths:
      - "SKILL.md"
      - ".github/workflows/clawhub-skill.yml"
  push:
    branches: [main]
    paths:
      - "SKILL.md"
  workflow_dispatch:

concurrency:
  group: clawhub-skill-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Validate SKILL.md
        run: |
          test -f SKILL.md
          grep -q '^name: wakehook$' SKILL.md
          grep -q '^description:' SKILL.md

  publish:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
    steps:
      - name: Require ClawHub token
        run: |
          if [ -z "${CLAWHUB_TOKEN}" ]; then
            echo "Missing required secret: CLAWHUB_TOKEN" >&2
            exit 1
          fi
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install ClawHub CLI
        run: npm install -g clawhub
      - name: Authenticate to ClawHub
        run: clawhub login --token "${CLAWHUB_TOKEN}" --no-browser
      - name: Confirm account
        run: clawhub whoami
      - name: Publish skill (root SKILL.md)
        run: >
          clawhub sync
          --root .
          --all
          --no-input
          --bump patch
          --changelog "Sync wakehook skill from ${GITHUB_SHA}"
          --tags "latest,wakehook,wake,sleep,google-health,fitbit,home-automation,morning,openclaw"
