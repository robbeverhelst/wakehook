name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # tags, release commit (changelog/version)
  issues: write # semantic-release comments
  pull-requests: write # semantic-release comments
  packages: write # push image to GHCR
  id-token: write # npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      # semantic-release is Node-native; run it on Node while the app stays Bun.
      # semantic-release v25 requires Node >=22.14.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # OIDC trusted publishing needs npm >= 11.5.1 (runner ships 10.x).
      - run: npm install -g npm@latest

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No NPM_TOKEN: npm auth comes from OIDC trusted publishing (id-token: write).
      - name: semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
